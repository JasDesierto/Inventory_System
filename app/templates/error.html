{% extends "layout.html" %}
{% block title %}{{ title }} | {{ app_name }}{% endblock %}
{% block content %}
<section class="hero hero--compact">
    <div class="hero__content card">
        <p class="eyebrow">Error {{ error_code }}</p>
        <h1>{{ title }}</h1>
        <p class="lede">{{ message }}</p>
        <a class="button" href="{{ url_for('inventory.dashboard') if current_user.is_authenticated else url_for('auth.login') }}">Return</a>
    </div>
</section>
{% endblock %}
